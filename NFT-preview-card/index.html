<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <title>Frontend Mentor | NFT preview card component</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Sora:wght@100..800&display=swap"
      rel="stylesheet"
    />
    
  </head>
  <body>
    <main class="main-card">
      <section class="card">
        <img src="images/image-equilibrium.jpg" alt="" />
        <h3>Equilibrium #3429</h3>
        <p>Our Equilibrium collection promotes balance and calm</p>

        <div class="info">
          <div class="eth">
            <img class="eth-img" src="images/icon-ethereum.svg" alt="" />
            <span>0.041 ETH</span>
          </div>
          <div class="time">
            <img class="clock-img" src="images/icon-clock.svg" alt="" />
            <span>3 days left</span>
          </div>
        </div>

    
         <hr>

        <div class="profile">
          <img src="images/image-avatar.png" alt="" />
          <p><span>Creation of</span> Jules Wyvern</p>
        </div>
      </section>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="https://www.frontendmentor.io/profile/pramodsuthar41">Pramod Suthar</a>.
    </footer>
  </body>
</html>
